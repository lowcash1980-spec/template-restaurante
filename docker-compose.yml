services:

  # ── Core (menú, disponibilidad, info) ─────────────────────
  core:
    build: ./core
    expose: ["8000"]
    env_file: ./core/.env
    volumes:
      - ./data/core.db:/app/core.db
      - ./data/uploads:/app/uploads
    restart: unless-stopped
    networks: [restaurante, easypanel]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.${NOMBRE}-core.rule=Host(`admin.${DOMINIO}`)"
      - "traefik.http.routers.${NOMBRE}-core.entrypoints=https"
      - "traefik.http.routers.${NOMBRE}-core.tls.certresolver=letsencrypt"
      - "traefik.http.services.${NOMBRE}-core.loadbalancer.server.port=8000"

  # ── CRM (clientes, campañas WhatsApp) ─────────────────────
  crm:
    build: ./crm
    expose: ["8003"]
    env_file: ./crm/.env
    volumes:
      - ./data/crm.db:/app/crm.db
    restart: unless-stopped
    networks: [restaurante, easypanel]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.${NOMBRE}-crm.rule=Host(`crm.${DOMINIO}`)"
      - "traefik.http.routers.${NOMBRE}-crm.entrypoints=https"
      - "traefik.http.routers.${NOMBRE}-crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.${NOMBRE}-crm.loadbalancer.server.port=8003"

  # ── Delivery (pedidos online) ──────────────────────────────
  delivery:
    build: ./delivery
    expose: ["8000"]
    env_file: ./delivery/.env
    volumes:
      - ./data/pedidos.db:/app/pedidos.db
      - ./delivery/static:/app/static
    restart: unless-stopped
    networks: [restaurante, easypanel]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.${NOMBRE}-delivery.rule=Host(`pedidos.${DOMINIO}`)"
      - "traefik.http.routers.${NOMBRE}-delivery.entrypoints=https"
      - "traefik.http.routers.${NOMBRE}-delivery.tls.certresolver=letsencrypt"
      - "traefik.http.services.${NOMBRE}-delivery.loadbalancer.server.port=8000"

  # ── Kmarero (carta digital QR) ─────────────────────────────
  kmarero:
    build: ./kmarero
    expose: ["80"]
    env_file: ./kmarero/.env
    restart: unless-stopped
    networks: [restaurante, easypanel]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.${NOMBRE}-kmarero.rule=Host(`carta.${DOMINIO}`)"
      - "traefik.http.routers.${NOMBRE}-kmarero.entrypoints=https"
      - "traefik.http.routers.${NOMBRE}-kmarero.tls.certresolver=letsencrypt"
      - "traefik.http.services.${NOMBRE}-kmarero.loadbalancer.server.port=80"

  # ── SARA (chatbot WhatsApp IA) ─────────────────────────────
  sara:
    build: ./sara
    expose: ["8002"]
    env_file: ./sara/.env
    volumes:
      - ./data/sara.db:/app/sara.db
      - ./sara/config:/app/config
      - ./sara/knowledge:/app/knowledge
    restart: unless-stopped
    networks: [restaurante, easypanel]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.${NOMBRE}-sara.rule=Host(`sara.${DOMINIO}`)"
      - "traefik.http.routers.${NOMBRE}-sara.entrypoints=https"
      - "traefik.http.routers.${NOMBRE}-sara.tls.certresolver=letsencrypt"
      - "traefik.http.services.${NOMBRE}-sara.loadbalancer.server.port=8002"

  # ── Web (página web del restaurante) ──────────────────────
  web:
    build: ./web
    expose: ["3000"]
    env_file: ./web/.env
    restart: unless-stopped
    networks: [restaurante, easypanel]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.${NOMBRE}-web.rule=Host(`${DOMINIO}`) || Host(`www.${DOMINIO}`)"
      - "traefik.http.routers.${NOMBRE}-web.entrypoints=https"
      - "traefik.http.routers.${NOMBRE}-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.${NOMBRE}-web.loadbalancer.server.port=3000"

networks:
  restaurante:
    driver: bridge
  easypanel:
    external: true